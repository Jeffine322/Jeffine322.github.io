<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 - Scholar's Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=Ma+Shan+Zheng&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f8f2e8;
      --paper:#fffdf6;
      --ink:#2c2118;
      --muted:#786d60;
      --theme:#a98ad5;
      --theme-soft:#efe5ff;
      --theme-deep:#7f65ad;
      --theme-table:#9a7fc4;
      --code-title:#c4b0e5;
      --code-bg:#efe5ff;
      --font-title:"Ma Shan Zheng","Long Cang","Microsoft YaHei",cursive;
      --font-body:"Microsoft YaHei","PingFang SC","Noto Sans SC",Arial,sans-serif;
    }
    body[data-theme="免杀"]{
      --theme:#e88d9d;
      --theme-soft:#fde8ee;
      --theme-deep:#b75f72;
      --theme-table:#d7798b;
      --code-title:#efb4c0;
      --code-bg:#fde8ee;
    }
    body[data-theme="渗透"]{
      --theme:#77aede;
      --theme-soft:#e7f2ff;
      --theme-deep:#4c84b6;
      --theme-table:#6e9fcf;
      --code-title:#6fa3cf;
      --code-bg:#d8edf8;
    }
    body[data-theme="开源"]{
      --theme:#e3bc46;
      --theme-soft:#fff2bd;
      --theme-deep:#ae8422;
      --theme-table:#d2a93a;
      --code-title:#e8cc6e;
      --code-bg:#fff2bd;
    }
    body[data-theme="其他"]{
      --theme:#a98ad5;
      --theme-soft:#efe5ff;
      --theme-deep:#7f65ad;
      --theme-table:#9a7fc4;
      --code-title:#c4b0e5;
      --code-bg:#efe5ff;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      color:var(--ink);
      font-family:var(--font-body);
      background-color:var(--bg);
      background-image:
        radial-gradient(circle at 12px 12px, rgba(120,95,65,.07) 1.2px, transparent 1.3px),
        linear-gradient(90deg, rgba(111,153,206,.12) 1px, transparent 1px),
        linear-gradient(rgba(111,153,206,.10) 1px, transparent 1px);
      background-size:18px 18px, 28px 28px, 28px 28px;
      padding:28px 16px 46px;
    }
    .wrap{
      max-width:960px;
      margin:0 auto;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:20px;
      color:#5b5048;
    }
    .top a{
      color:inherit;
      text-decoration:none;
      border-bottom:3px solid rgba(232,141,157,.55);
      padding-bottom:3px;
    }
    article{
      background:rgba(255,253,246,.96);
      color:var(--ink);
      border-radius:22px;
      padding:42px 48px;
      box-shadow:0 14px 28px rgba(86,66,42,.12);
      line-height:1.9;
      font-size:17px;
      overflow:hidden;
    }
    .article-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin:0 0 18px;
      color:#746a61;
      font-size:14px;
    }
    .article-tag{
      display:inline-flex;
      align-items:center;
      padding:4px 11px;
      border-radius:999px;
      background:var(--theme-soft);
      color:var(--theme-deep);
      font-weight:700;
    }
    h1{
      font-family:var(--font-title);
      font-size:44px;
      letter-spacing:2px;
      margin:0 0 18px;
      position:relative;
      display:inline-block;
      line-height:1.25;
      color:var(--ink);
    }
    h1::after{
      content:"";
      position:absolute;
      left:-4px;
      right:-8px;
      bottom:2px;
      height:8px;
      background:color-mix(in srgb, var(--theme) 62%, white);
      z-index:-1;
      border-radius:999px;
    }
    h2{font-size:26px;margin:30px 0 10px;color:var(--ink)}
    h3{font-size:22px;margin:24px 0 8px;color:var(--ink)}
    p{margin:12px 0;color:#3f372f}
    ul,ol{padding-left:28px;margin:12px 0;color:#3f372f}
    li{margin:6px 0}
    code{
      background:var(--theme-soft);
      color:#3a2b22;
      padding:2px 6px;
      border-radius:5px;
      font-family:Consolas,"JetBrains Mono","Courier New",monospace;
    }

    .code-card{
      margin:18px 0 24px;
      border-radius:14px;
      overflow:hidden;
      border:1px solid color-mix(in srgb, var(--code-title) 72%, #fff);
      box-shadow:0 10px 18px rgba(86,66,42,.08);
      background:var(--code-bg);
      color:#1f1a16;
      clear:both;
    }
    .code-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 18px;
      background:var(--code-title);
      color:#fff;
      font-family:"Times New Roman", Times, serif;
      font-weight:700;
      letter-spacing:.8px;
      text-transform:lowercase;
    }
    .code-title::after{
      content:"copy";
      opacity:.9;
      font-size:12px;
      letter-spacing:1px;
    }
    .code-card pre{
      margin:0;
      padding:18px 20px 20px;
      background:var(--code-bg);
      color:#1f1a16;
      overflow:auto;
      line-height:1.78;
      font-size:15px;
      font-weight:600;
    }
    .code-card pre code{
      display:block;
      background:transparent !important;
      color:#1f1a16 !important;
      padding:0;
      border-radius:0;
      font-family:Consolas,"JetBrains Mono","Courier New",monospace;
      white-space:pre;
      text-shadow:none;
    }


    .code-card code,
    .code-card pre,
    .code-card pre *{
      color:#1f1a16 !important;
      background:transparent !important;
    }
    .code-card pre{
      background:var(--code-bg) !important;
    }
    blockquote{
      border-left:5px solid var(--theme);
      padding:10px 14px 10px 16px;
      color:#66594f;
      margin:18px 0;
      background:color-mix(in srgb, var(--theme-soft) 65%, white);
      border-radius:0 12px 12px 0;
    }
    .table-wrap{
      margin:20px 0 26px;
      overflow:auto;
      border-radius:10px;
      box-shadow:0 10px 18px rgba(86,66,42,.08);
      border:1px solid rgba(120,95,65,.10);
      background:rgba(255,253,246,.9);
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:680px;
      font-size:15px;
      line-height:1.7;
    }
    thead th{
      background:var(--theme-table);
      color:#fff;
      text-align:left;
      font-weight:700;
      padding:12px 16px;
      border-right:1px solid rgba(255,255,255,.26);
      white-space:nowrap;
    }
    thead th:last-child{border-right:none}
    tbody td{
      padding:12px 16px;
      border-bottom:1px solid rgba(120,95,65,.08);
      border-right:1px solid rgba(120,95,65,.06);
      color:#322820;
      vertical-align:top;
    }
    tbody td:last-child{border-right:none}
    tbody tr:nth-child(even){
      background:color-mix(in srgb, var(--theme-soft) 46%, white);
    }
    tbody tr:nth-child(odd){
      background:rgba(255,253,246,.82);
    }

    .mermaid-wrap{
      margin:20px 0 26px;
      padding:18px;
      border-radius:16px;
      background:
        radial-gradient(circle at 12px 12px, rgba(120,95,65,.045) 1.1px, transparent 1.2px),
        linear-gradient(180deg, color-mix(in srgb, var(--theme-soft) 82%, white), #fffdf7);
      background-size:16px 16px, auto;
      border:1px solid color-mix(in srgb, var(--theme) 34%, transparent);
      box-shadow:0 10px 18px rgba(86,66,42,.08);
      overflow:auto;
    }
    .mermaid{
      min-width:520px;
      text-align:center;
    }

    @media (max-width:700px){
      article{padding:30px 22px}
      h1{font-size:36px}
      table{min-width:620px}
    }
  </style>
</head>
<body data-theme="其他">
  <div class="wrap">
    <div class="top">
      <a href="./index.html">← 返回首页</a>
      <span>Scholar's Notes</span>
    </div>
    <article id="article">
      <p>正在读取文章...</p>
    </article>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <script>
    function escapeHTML(text){
      return String(text ?? "").replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }

    function normalizeTag(tag){
      const raw = String(tag || "").trim();
      if(["免杀","bypass","Bypass","免杀学习"].includes(raw)) return "免杀";
      if(["渗透","渗透测试","SRC","src","信息收集","Web","web"].includes(raw)) return "渗透";
      if(["开源","项目","工具","工具项目"].includes(raw)) return "开源";
      return raw || "其他";
    }

    function parseFrontMatter(md){
      const text = md || "";
      const meta = {};
      let body = text;
      const fm = text.match(/^---\s*([\s\S]*?)\s*---\s*/);
      if(fm){
        fm[1].split(/\r?\n/).forEach(line => {
          const idx = line.indexOf(":");
          if(idx > -1){
            const key = line.slice(0, idx).trim();
            const value = line.slice(idx + 1).trim().replace(/^["']|["']$/g, "");
            meta[key] = value;
          }
        });
        body = text.slice(fm[0].length);
      }
      return {meta, body};
    }

    function setupMarked(){
      const renderer = new marked.Renderer();

      renderer.code = function(code, lang){
        const language = String(lang || "txt").trim().toLowerCase() || "txt";
        if(language === "mermaid"){
          return `<div class="mermaid-wrap"><div class="mermaid">${escapeHTML(code)}</div></div>`;
        }
        return `<div class="code-card"><div class="code-title">${escapeHTML(language)}</div><pre><code>${escapeHTML(code)}</code></pre></div>`;
      };

      renderer.table = function(header, body){
        return `<div class="table-wrap"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
      };

      marked.setOptions({
        renderer,
        gfm:true,
        breaks:false,
        mangle:false,
        headerIds:false
      });
    }

    function renderArticle(markdown){
      const {meta, body} = parseFrontMatter(markdown);
      const tag = normalizeTag(meta.tag || meta.category || "其他");
      document.body.dataset.theme = tag;

      setupMarked();

      const article = document.getElementById("article");
      const metaHTML = `
        <div class="article-meta">
          <span class="article-tag">${escapeHTML(tag)}</span>
          ${meta.date ? `<time>${escapeHTML(meta.date)}</time>` : ""}
        </div>
      `;

      article.innerHTML = metaHTML + marked.parse(body);

      if(window.mermaid){
        mermaid.initialize({
          startOnLoad:false,
          theme:"base",
          themeVariables:{
            primaryColor:getComputedStyle(document.body).getPropertyValue("--theme-soft").trim(),
            primaryBorderColor:getComputedStyle(document.body).getPropertyValue("--theme").trim(),
            primaryTextColor:"#2c2118",
            lineColor:getComputedStyle(document.body).getPropertyValue("--theme-deep").trim()
          }
        });
        mermaid.run({querySelector: ".mermaid"});
      }
    }

    async function init(){
      const params = new URLSearchParams(location.search);
      const src = params.get("src");
      const article = document.getElementById("article");

      if(!src){
        article.innerHTML = "<h1>没有找到文章</h1><p>请从首页点击文章进入。</p>";
        return;
      }

      try{
        const res = await fetch(src);
        const text = await res.text();
        renderArticle(text);
      }catch(e){
        article.innerHTML = "<h1>文章读取失败</h1><p>可能是文章链接还没部署完成，稍等一会儿再刷新。</p>";
      }
    }

    init();
  </script>
</body>
</html>
