<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 - Scholar's Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=Ma+Shan+Zheng&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f8f2e8;
      --paper:#fffdf6;
      --ink:#2c2118;
      --muted:#786d60;
      --pink:#e88d9d;
      --font-title:"Ma Shan Zheng","Long Cang","Microsoft YaHei",cursive;
      --font-body:"Microsoft YaHei","PingFang SC","Noto Sans SC",Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      color:var(--ink);
      font-family:var(--font-body);
      background-color:var(--bg);
      background-image:
        radial-gradient(circle at 12px 12px, rgba(120,95,65,.07) 1.2px, transparent 1.3px),
        linear-gradient(90deg, rgba(111,153,206,.12) 1px, transparent 1px),
        linear-gradient(rgba(111,153,206,.10) 1px, transparent 1px);
      background-size:18px 18px, 28px 28px, 28px 28px;
      padding:28px 16px 46px;
    }
    .wrap{
      max-width:900px;
      margin:0 auto;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:20px;
      color:#5b5048;
    }
    .top a{
      color:inherit;
      text-decoration:none;
      border-bottom:3px solid rgba(232,141,157,.55);
      padding-bottom:3px;
    }
    article{
      background:rgba(255,253,246,.94);
      border-radius:22px;
      padding:42px 48px;
      box-shadow:0 14px 28px rgba(86,66,42,.12);
      line-height:1.9;
      font-size:17px;
    }
    h1{
      font-family:var(--font-title);
      font-size:44px;
      letter-spacing:2px;
      margin-bottom:18px;
      position:relative;
      display:inline-block;
    }
    h1::after{
      content:"";
      position:absolute;
      left:-4px;
      right:-8px;
      bottom:2px;
      height:8px;
      background:rgba(232,141,157,.55);
      z-index:-1;
      border-radius:999px;
    }
    h2{font-size:26px;margin:28px 0 10px}
    h3{font-size:22px;margin:22px 0 8px}
    p{margin:12px 0;color:#3f372f}
    ul,ol{padding-left:28px;margin:12px 0}
    li{margin:6px 0}
    code{
      background:#f3eadc;
      padding:2px 6px;
      border-radius:5px;
      font-family:Consolas,monospace;
    }
    pre{
      background:#2f2924;
      color:#fff8ef;
      padding:18px;
      border-radius:14px;
      overflow:auto;
      margin:16px 0;
    }
    pre code{background:transparent;padding:0}
    blockquote{
      border-left:5px solid rgba(232,141,157,.68);
      padding-left:16px;
      color:#66594f;
      margin:18px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="./index.html">← 返回首页</a>
      <span>Scholar's Notes</span>
    </div>
    <article id="article">
      <p>正在读取文章...</p>
    </article>
  </div>

  <script>
    function escapeHTML(text){
      return String(text ?? "").replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }

    function stripFrontMatter(md){
      return md.replace(/^---\s*[\s\S]*?\s*---\s*/, "");
    }

    function mdToHTML(md){
      md = stripFrontMatter(md || "");
      const blocks = [];
      md = md.replace(/```([\s\S]*?)```/g, (_, code) => {
        const id = `@@CODE${blocks.length}@@`;
        blocks.push(`<pre><code>${escapeHTML(code.trim())}</code></pre>`);
        return id;
      });

      let html = escapeHTML(md)
        .replace(/^### (.*)$/gm, "<h3>$1</h3>")
        .replace(/^## (.*)$/gm, "<h2>$1</h2>")
        .replace(/^# (.*)$/gm, "<h1>$1</h1>")
        .replace(/^&gt; (.*)$/gm, "<blockquote>$1</blockquote>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+)`/g, "<code>$1</code>");

      html = html.split(/\n{2,}/).map(part => {
        if(/^<h[1-3]|^<pre|^<blockquote/.test(part.trim())) return part;
        const lines = part.split(/\n/).filter(Boolean);
        if(lines.every(l => /^[-*]\s+/.test(l))){
          return "<ul>" + lines.map(l => `<li>${l.replace(/^[-*]\s+/, "")}</li>`).join("") + "</ul>";
        }
        return `<p>${part.replace(/\n/g, "<br>")}</p>`;
      }).join("\n");

      blocks.forEach((block, i) => {
        html = html.replace(`@@CODE${i}@@`, block);
      });
      return html;
    }

    async function init(){
      const params = new URLSearchParams(location.search);
      const src = params.get("src");
      const article = document.getElementById("article");
      if(!src){
        article.innerHTML = "<h1>没有找到文章</h1><p>请从首页点击文章进入。</p>";
        return;
      }
      try{
        const res = await fetch(src);
        const text = await res.text();
        article.innerHTML = mdToHTML(text);
      }catch(e){
        article.innerHTML = "<h1>文章读取失败</h1><p>可能是文章链接还没部署完成，稍等一会儿再刷新。</p>";
      }
    }
    init();
  </script>
</body>
</html>
